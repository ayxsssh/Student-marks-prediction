<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Marks Predictor ✦</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-anim"></div>
    <div class="container">

        <header>
            <h1>✦ AI Marks Predictor</h1>
            <p>Predict student performance using various Machine Learning models.</p>
        </header>

        <main class="glass-panel">
            <div class="left-section">
                <h2>Prediction Parameters</h2>

                <div class="input-group">
                    <label for="model-select">Select ML Model</label>
                    <div class="select-wrapper">
                        <select id="model-select">
                            <option value="linear">Loading models...</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="hours-studied">Hours Studied / Day</label>
                        <input type="number" id="hours-studied" placeholder="e.g. 5" step="0.1" min="0" max="24">
                    </div>

                    <div class="input-group">
                        <label for="sleep-hours">Sleep Hours / Day</label>
                        <input type="number" id="sleep-hours" placeholder="e.g. 8" step="0.1" min="0" max="24">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="attendance">Attendance (%)</label>
                        <input type="number" id="attendance" placeholder="e.g. 85" step="1" min="0" max="100">
                    </div>

                    <div class="input-group">
                        <label for="previous-scores">Previous Scores</label>
                        <input type="number" id="previous-scores" placeholder="e.g. 75" step="1" min="0" max="100">
                    </div>
                </div>

                <button id="predict-btn" class="glow-btn">
                    <span>Generate Prediction</span>
                </button>
                <div id="error-msg" class="error-msg"></div>
            </div>

            <div class="right-section" style="justify-content: center;">
                <div class="result-card">
                    <h3>Predicted Score</h3>
                    <div class="score-display">
                        <span id="score-value">--</span><span class="percent">%</span>
                    </div>
                    <div class="model-badge" id="current-model-badge">Awaiting Input</div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
